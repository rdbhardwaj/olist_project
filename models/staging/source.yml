version: 2

sources:
  - name: raw
    database: OLIST_DB
    schema: RAW

    tables:
      - name: customers
      - name: orders
        config:
          loaded_at_field: order_purchase_timestamp

          freshness:
            warn_after:
              count: 3630
              period: day

            error_after:
              count: 7300
              period: day
      - name: order_items
      - name: payments
      - name: reviews
      - name: products
      - name: sellers
      - name: geolocation
      - name: category_translations