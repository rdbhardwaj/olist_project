version: 2

models:
  - name: int_order_details

    description: One row per purchased item.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id

    columns:

      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

  - name: int_customer_orders

    description: One row per customer order enriched with customer information.

    columns:

      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
  - name: int_payments_summary

    description: Payment summary at the order level.

    columns:

      - name: order_id
        tests:
          - unique
          - not_null