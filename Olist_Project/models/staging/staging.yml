version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data from the raw customers table."

    columns:
      - name: customer_id
        description: "Primary key for a customer."

        tests:
          - unique
          - not_null

      - name: customer_unique_id
        description: "Unique identifier shared across customer accounts."

        tests:
          - not_null

      - name: zip_code_prefix
        description: "Customer ZIP code prefix."

      - name: city
        description: "Customer city."

      - name: state
        description: "Customer state."

  - name: stg_orders
    description: Cleaned orders table.

    columns:

      - name: order_id
        description: Primary key for each order.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Customer who placed the order.
        tests:
          - not_null

      - name: order_status
        description: Current order status.
        tests:
          - not_null
  - name: stg_order_items

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id
    columns:

      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null
  - name: stg_products

    columns:
      - name: product_id
        tests:
          - unique
          - not_null

      - name: product_category_name

      - name: product_weight_g

      - name: product_length_cm

      - name: product_height_cm

      - name: product_width_cm
  - name: stg_reviews

    columns:

      - name: review_id
        tests:
          - not_null

      - name: review_score
        tests:
          - not_null
  - name: stg_payments

    columns:

      - name: order_id
        tests:
          - not_null

      - name: payment_type
        tests:
          - not_null

      - name: payment_value
        tests:
          - not_null
  - name: stg_sellers

    columns:

      - name: seller_id
        tests:
          - unique
          - not_null
  - name: stg_category_translations

    columns:

      - name: product_category_name
        tests:
          - unique
          - not_null